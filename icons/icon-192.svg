<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo teal de Windows 95 -->
  <rect width="192" height="192" fill="#008080"/>
  <!-- Sombra del bloc -->
  <rect x="52" y="28" width="96" height="132" fill="#404040" rx="2"/>
  <!-- Cuerpo del bloc de notas -->
  <rect x="48" y="24" width="96" height="132" fill="#fffde8" stroke="#000" stroke-width="3"/>
  <!-- Encabezado azul (barra de título estilo Win95) -->
  <rect x="48" y="24" width="96" height="24" fill="#5b5ba8"/>
  <!-- Texto simulado en el encabezado -->
  <rect x="56" y="31" width="40" height="4" fill="#ffffff" opacity="0.7"/>
  <rect x="100" y="31" width="20" height="4" fill="#ffffff" opacity="0.4"/>
  <!-- Líneas de texto -->
  <line x1="56" y1="66" x2="136" y2="66" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="56" y1="80" x2="136" y2="80" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="56" y1="94" x2="136" y2="94" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="56" y1="108" x2="120" y2="108" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="56" y1="122" x2="104" y2="122" stroke="#c0c0c0" stroke-width="2"/>
  <!-- Contenido simulado -->
  <rect x="56" y="60" width="52" height="7" fill="#333" opacity="0.65"/>
  <rect x="56" y="74" width="72" height="7" fill="#333" opacity="0.45"/>
  <rect x="56" y="88" width="44" height="7" fill="#333" opacity="0.35"/>
  <rect x="56" y="102" width="60" height="7" fill="#333" opacity="0.45"/>
  <rect x="56" y="116" width="36" height="7" fill="#333" opacity="0.30"/>
  <!-- Espiral del bloc (lateral izquierdo) -->
  <rect x="44" y="36" width="8" height="8" rx="4" fill="#888"/>
  <rect x="44" y="56" width="8" height="8" rx="4" fill="#888"/>
  <rect x="44" y="76" width="8" height="8" rx="4" fill="#888"/>
  <rect x="44" y="96" width="8" height="8" rx="4" fill="#888"/>
  <rect x="44" y="116" width="8" height="8" rx="4" fill="#888"/>
  <rect x="44" y="136" width="8" height="8" rx="4" fill="#888"/>
</svg>
